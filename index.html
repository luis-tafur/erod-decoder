<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EROD Decoder - FMCSA ELD File Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0d12;--surface:#12151c;--surface2:#181c26;--surface3:#1e2330;
  --border:#252a38;--border2:#2f3548;
  --text:#dfe2eb;--text2:#8891a5;--text3:#5c6478;
  --accent:#4f7df9;--accent2:#7ba1ff;--accent-dim:rgba(79,125,249,.08);
  --off-duty:#34d399;--off-duty-dim:rgba(52,211,153,.12);
  --sleeper:#60a5fa;--sleeper-dim:rgba(96,165,250,.12);
  --driving:#f87171;--driving-dim:rgba(248,113,113,.12);
  --on-duty:#fbbf24;--on-duty-dim:rgba(251,191,36,.12);
  --cert:#c084fc;--cert-dim:rgba(192,132,252,.1);
  --malf:#fb7185;--login:#22d3ee;--engine:#fb923c;
  --radius:8px;--radius-lg:12px;
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);
  color:var(--text);line-height:1.6;min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -20%, rgba(79,125,249,.04), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(192,132,252,.03), transparent);
}
::selection{background:rgba(79,125,249,.3)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ===== DROP ZONE ===== */
#drop-zone{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:92vh;padding:48px 24px;cursor:pointer;position:relative;
}
#drop-zone::before{
  content:'';position:absolute;inset:32px;
  border:1.5px dashed var(--border2);border-radius:20px;
  transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;
}
#drop-zone.dragover::before{
  border-color:var(--accent);box-shadow:0 0 40px rgba(79,125,249,.1);
  inset:28px;
}
.drop-icon{
  width:80px;height:80px;margin-bottom:28px;opacity:.35;
  transition:all .4s cubic-bezier(.4,0,.2,1);
}
#drop-zone.dragover .drop-icon{opacity:.7;transform:translateY(-4px) scale(1.05)}
.drop-icon svg{width:100%;height:100%;stroke:var(--text);stroke-width:1.2;fill:none}
#drop-zone h1{
  font-family:'Instrument Serif',Georgia,serif;font-size:42px;font-weight:400;
  letter-spacing:-.02em;margin-bottom:8px;
  background:linear-gradient(135deg,var(--text),var(--text2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#drop-zone p{color:var(--text3);font-size:15px;margin-bottom:32px;letter-spacing:.01em}
#file-input{display:none}
.btn{
  background:var(--accent);color:#fff;border:none;
  padding:12px 32px;border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;letter-spacing:.02em;
  transition:all .2s;position:relative;overflow:hidden;
}
.btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(79,125,249,.2)}
.btn:active{transform:translateY(0)}
.version-tag{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);
  letter-spacing:.06em;
}

/* ===== MAIN CONTENT ===== */
#content{display:none;padding:0 20px 60px;max-width:1440px;margin:0 auto}

/* Top bar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;margin-bottom:12px;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,var(--bg) 60%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-brand{
  font-family:'Instrument Serif',serif;font-size:20px;color:var(--text2);
  font-style:italic;
}
.topbar-sep{width:1px;height:20px;background:var(--border2)}
.topbar-file{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  color:var(--text3);letter-spacing:.02em;
  background:var(--surface);padding:5px 12px;border-radius:6px;
  border:1px solid var(--border);
}
.btn-ghost{
  background:transparent;color:var(--text2);border:1px solid var(--border);
  padding:6px 16px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;
  font-size:13px;cursor:pointer;transition:all .15s;font-weight:500;
}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);background:var(--surface)}

/* ===== HEADER CARD ===== */
.header-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:0;margin-bottom:16px;overflow:hidden;
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid var(--border);
}
.header-driver{display:flex;align-items:center;gap:14px}
.driver-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--cert));
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;color:#fff;
  flex-shrink:0;
}
.driver-name{font-size:18px;font-weight:600;letter-spacing:-.01em}
.driver-carrier{font-size:13px;color:var(--text2);margin-top:1px}
.header-eld-badge{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--accent2);background:var(--accent-dim);
  padding:4px 12px;border-radius:20px;border:1px solid rgba(79,125,249,.15);
  letter-spacing:.04em;
}
.header-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  padding:16px 24px 20px;gap:0;
}
.header-field{
  padding:8px 0;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:2px;
}
.header-field:nth-last-child(-n+4){border-bottom:none}
.header-field label{
  font-size:10px;color:var(--text3);text-transform:uppercase;
  letter-spacing:.08em;font-weight:500;
}
.header-field span{
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;
  color:var(--text);
}

/* ===== SUMMARY CARDS ===== */
.summary-row{
  display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px;
}
@media(max-width:900px){.summary-row{grid-template-columns:repeat(4,1fr)}}
.summary-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 12px;text-align:center;
  position:relative;overflow:hidden;transition:border-color .15s;
}
.summary-card:hover{border-color:var(--border2)}
.summary-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.summary-card .num{
  font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;
  line-height:1.1;
}
.summary-card .lbl{
  font-size:11px;color:var(--text3);margin-top:4px;
  text-transform:uppercase;letter-spacing:.06em;font-weight:500;
}

/* ===== TABS ===== */
.tabs{
  display:flex;gap:2px;margin-bottom:16px;
  border-bottom:1px solid var(--border);overflow-x:auto;
  scrollbar-width:none;-ms-overflow-style:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;
  color:var(--text3);background:transparent;border:none;
  border-bottom:2px solid transparent;transition:all .15s;
  display:flex;align-items:center;gap:7px;white-space:nowrap;
  flex-shrink:0;
}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab .badge{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  background:var(--surface2);padding:1px 7px;border-radius:4px;
  color:var(--text3);
}
.tab.active .badge{background:var(--accent);color:#fff}
.tab .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tab-panel{display:none;animation:fadeUp .25s ease}
.tab-panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ===== TABLES ===== */
.table-wrap{
  overflow-x:auto;border-radius:var(--radius-lg);
  border:1px solid var(--border);background:var(--surface);
}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  background:var(--surface2);padding:10px 14px;text-align:left;
  font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.07em;
  color:var(--text3);position:sticky;top:0;white-space:nowrap;
  border-bottom:1px solid var(--border);
}
td{
  padding:8px 14px;border-top:1px solid var(--border);
  vertical-align:middle;font-size:13px;
}
tbody tr{transition:background .1s}
tbody tr:hover{background:rgba(79,125,249,.03)}
tbody tr:nth-child(even){background:rgba(255,255,255,.01)}
tbody tr:nth-child(even):hover{background:rgba(79,125,249,.04)}

/* ===== BADGES ===== */
.status-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:5px;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
  letter-spacing:.02em;white-space:nowrap;
}
.status-badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.status-off-duty{background:var(--off-duty-dim);color:var(--off-duty)}
.status-off-duty::before{background:var(--off-duty)}
.status-sleeper{background:var(--sleeper-dim);color:var(--sleeper)}
.status-sleeper::before{background:var(--sleeper)}
.status-driving{background:var(--driving-dim);color:var(--driving)}
.status-driving::before{background:var(--driving)}
.status-on-duty{background:var(--on-duty-dim);color:var(--on-duty)}
.status-on-duty::before{background:var(--on-duty)}
.status-active{background:rgba(52,211,153,.1);color:var(--off-duty)}
.status-active::before{background:var(--off-duty)}
.status-inactive{background:rgba(92,100,120,.12);color:var(--text3)}
.status-inactive::before{background:var(--text3)}
.status-certify{background:var(--cert-dim);color:var(--cert)}
.status-certify::before{background:var(--cert)}
.status-recertify{background:rgba(34,211,238,.1);color:var(--login)}
.status-recertify::before{background:var(--login)}
.origin-auto{color:var(--text3)}
.origin-driver{color:var(--accent2)}
.origin-carrier{color:var(--on-duty)}
.origin-unid{color:var(--malf)}
.annotation-text{
  font-style:italic;color:var(--accent2);font-size:12px;
  max-width:220px;display:inline-block;
}
.coord{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);
  letter-spacing:.02em;
}
.cert-day{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;
  color:var(--cert);background:var(--cert-dim);
  padding:4px 12px;border-radius:6px;border:1px solid rgba(192,132,252,.15);
  letter-spacing:.03em;
}

/* ===== TIMELINE ===== */
.timeline-container{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:24px;overflow:hidden;
}
.timeline-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.timeline-title{font-size:15px;font-weight:600;color:var(--text)}
.timeline-legend{display:flex;gap:16px;flex-wrap:wrap}
.legend-item{
  display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);
  cursor:default;
}
.legend-swatch{
  width:12px;height:12px;border-radius:3px;flex-shrink:0;
  border:1px solid rgba(255,255,255,.08);
}
/* Hour axis */
.timeline-axis{
  display:flex;align-items:flex-end;margin-left:100px;margin-bottom:6px;
  position:relative;height:18px;
}
.timeline-axis-tick{
  position:absolute;font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--text3);transform:translateX(-50%);
  letter-spacing:.04em;
}
.timeline-axis-line{
  position:absolute;bottom:0;width:1px;height:6px;background:var(--border2);
  transform:translateX(-50%);
}
/* Day rows */
.timeline-day{
  display:flex;align-items:center;gap:12px;margin-bottom:4px;
  position:relative;
}
.timeline-label{
  width:88px;font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--text2);text-align:right;flex-shrink:0;
  font-weight:500;letter-spacing:.02em;
}
.timeline-bar{
  flex:1;height:32px;background:var(--surface2);border-radius:4px;
  position:relative;overflow:hidden;border:1px solid var(--border);
}
/* Gridlines every 6h */
.timeline-gridline{
  position:absolute;top:0;bottom:0;width:1px;
  background:var(--border);opacity:.5;pointer-events:none;
}
.timeline-segment{
  position:absolute;top:0;height:100%;min-width:2px;
  transition:filter .15s;cursor:pointer;
}
.timeline-segment:hover{filter:brightness(1.3)}
.timeline-tooltip{
  display:none;position:absolute;bottom:calc(100% + 8px);
  left:50%;transform:translateX(-50%);z-index:20;
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:var(--radius);padding:10px 14px;
  box-shadow:0 12px 32px rgba(0,0,0,.4);
  min-width:180px;pointer-events:none;
}
.timeline-segment:hover .timeline-tooltip{display:block}
.timeline-tooltip .tt-status{
  display:flex;align-items:center;gap:6px;font-weight:600;
  font-size:13px;margin-bottom:6px;
}
.timeline-tooltip .tt-dot{width:8px;height:8px;border-radius:50%}
.timeline-tooltip .tt-detail{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--text2);line-height:1.6;
}

/* Malf */
.malf-malfunction{color:var(--malf);font-weight:600}
.malf-diagnostic{color:var(--on-duty);font-weight:600}

/* Empty */
.empty{padding:48px;text-align:center;color:var(--text3);font-size:14px}
</style>
</head>
<body>

<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <div class="drop-icon">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="16" width="64" height="48" rx="4" stroke-dasharray="4 3"/>
      <path d="M28 44 L40 32 L52 44" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="40" y1="32" x2="40" y2="54" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>EROD Decoder</h1>
  <p>Drop an FMCSA ELD output file here, or click to browse</p>
  <button class="btn" onclick="event.stopPropagation();document.getElementById('file-input').click()">Select File</button>
  <input type="file" id="file-input">
  <div class="version-tag">FMCSA 49 CFR Part 395</div>
</div>

<div id="content">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-brand">EROD Decoder</span>
      <span class="topbar-sep"></span>
      <span class="topbar-file" id="file-name-display"></span>
    </div>
    <button class="btn-ghost" onclick="location.reload()">Load another file</button>
  </div>
  <div class="header-card" id="header-card"></div>
  <div class="summary-row" id="summary-row"></div>
  <div class="tabs" id="tabs"></div>
  <div id="tab-panels"></div>
</div>

<script>
// ========== CONSTANTS ==========
const EVENT_TYPES = {1:'Duty Status',2:'Intermediate',3:'Driver Indication'};
const DUTY_CODES = {1:'Off Duty',2:'Sleeper Berth',3:'Driving',4:'On Duty (Not Driving)'};
const DUTY_SHORT = {1:'OFF',2:'SB',3:'DR',4:'ON'};
const DUTY_CSS = {1:'off-duty',2:'sleeper',3:'driving',4:'on-duty'};
const DUTY_COLORS = {1:'var(--off-duty)',2:'var(--sleeper)',3:'var(--driving)',4:'var(--on-duty)'};
const DUTY_HEX = {1:'#34d399',2:'#60a5fa',3:'#f87171',4:'#fbbf24'};
const RECORD_STATUS = {1:'Active',2:'Inactive-Changed',3:'Inactive-Change Req',4:'Inactive-Change Rej'};
const RECORD_ORIGIN = {1:'Auto (ELD)',2:'Driver',3:'Motor Carrier',4:'Unidentified'};
const ORIGIN_CSS = {1:'origin-auto',2:'origin-driver',3:'origin-carrier',4:'origin-unid'};
const CERT_ACTIONS = {1:'Certify',2:'Recertify'};
const MALF_EVENT_TYPES = {3:'Data Diagnostic',4:'Malfunction'};
const MALF_CODES_DIAG = {1:'Power Data Diagnostic',2:'Engine Sync Data Diagnostic',3:'Missing Data Diagnostic',4:'Data Transfer Data Diagnostic',5:'Unidentified Driving Records',6:'Other'};
const MALF_CODES_MALF = {1:'Power Compliance',2:'Engine Sync Compliance',3:'Timing Compliance',4:'Positioning Compliance',5:'Data Recording Compliance',6:'Data Transfer Compliance',7:'Other'};
const ENGINE_TYPES = {1:'Shut Down',3:'Power Up'};
const LOGIN_TYPES = {1:'Login',2:'Logout'};

// ========== HELPERS ==========
function fmtDate(d){
  if(!d||d.length!==6) return d||'';
  return d.slice(0,2)+'/'+d.slice(2,4)+'/20'+d.slice(4,6);
}
function fmtDateShort(d){
  if(!d||d.length!==6) return d||'';
  return d.slice(0,2)+'/'+d.slice(2,4);
}
function fmtTime(t){
  if(!t||t.length!==6) return t||'';
  return t.slice(0,2)+':'+t.slice(2,4)+':'+t.slice(4,6);
}
function fmtTimeShort(t){
  if(!t||t.length!==6) return t||'';
  return t.slice(0,2)+':'+t.slice(2,4);
}
function fmtCoord(v){
  if(!v||v==='X') return '-';
  return parseFloat(v).toFixed(2);
}
function timeToMinutes(t){
  if(!t||t.length!==6) return 0;
  return parseInt(t.slice(0,2))*60+parseInt(t.slice(2,4));
}
function minutesToTime(m){
  const h=String(Math.floor(m/60)).padStart(2,'0');
  const mm=String(m%60).padStart(2,'0');
  return h+':'+mm;
}
function durationStr(mins){
  const h=Math.floor(mins/60);const m=mins%60;
  return h>0?(h+'h '+(m>0?m+'m':'')):(m+'m');
}

// ========== PARSER ==========
function parseEROD(rawText){
  const text = rawText.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const data = {header:{},users:[],cmvs:[],events:[],annotations:{},certifications:[],malfunctions:[],logins:[],engines:[],unidentified:[],checksum:''};
  const segLabels = [
    'ELD File Header Segment:','User List:','CMV List:','ELD Event List:',
    'ELD Event Annotations or Comments:',"Driver's Certification/Recertification Actions:",
    'Malfunctions and Data Diagnostic Events:','ELD Login/Logout Report:',
    'CMV Engine Power-Up and Shut Down Activity:','Unidentified Driver Profile Records:','End of File:'
  ];
  const segments = {};
  let remaining = text;
  for(let i=0;i<segLabels.length;i++){
    const label=segLabels[i],nextLabel=segLabels[i+1];
    const startIdx=remaining.indexOf(label);
    if(startIdx===-1) continue;
    const contentStart=startIdx+label.length;
    let contentEnd=nextLabel?remaining.indexOf(nextLabel,contentStart):-1;
    if(contentEnd===-1) contentEnd=remaining.length;
    segments[label]=remaining.slice(contentStart,contentEnd).trim();
  }

  // Header
  const hdrRaw=segments['ELD File Header Segment:'];
  if(hdrRaw){
    const hdrLines=hdrRaw.split('\n').filter(l=>l.trim());
    const allFields=[];
    for(const line of hdrLines){const parts=line.split(',');if(parts.length>1)parts.pop();allFields.push(...parts);}
    const h=allFields;
    data.header={
      lastName:h[0]||'',firstName:h[1]||'',eldId:h[2]||'',
      dlState:h[3]||'',dlNumber:h[4]||'',
      dotNumber:h[8]||'',vin:h[9]||'',truckNumber:h[10]||'',
      trailerNumber:h[11]||'',carrierName:h[12]||'',
      multiDay:h[13]||'',startHour:h[14]||'',timeZoneOffset:h[15]||'',
      shippingId:h[16]||'',recordCount:h[17]||'',
      eldRegistration:h[18]||'',outputFileDate:h[19]||'',
      codriverLast:h[20]||'',codriverFirst:h[21]||'',
      codriverAccumHours:h[23]||'',
      codriverFlag:(h[20]&&h[20]!=='X')?'1':'0',
      eldProvider:h[24]||'',eldFirmware:h[25]||'',certificate:h[26]||''
    };
  }
  // Users
  const uRaw=segments['User List:'];
  if(uRaw){
    const allParts=uRaw.replace(/\n/g,',').split(',').filter(p=>p.trim());
    let idx=0;if(allParts.length>0&&/^\d+$/.test(allParts[0].trim()))idx=1;
    while(idx+3<allParts.length){
      data.users.push({userId:allParts[idx].trim(),role:allParts[idx+1].trim(),lastName:allParts[idx+2].trim(),firstName:allParts[idx+3].trim()});
      idx+=4;
    }
  }
  // CMVs
  const cRaw=segments['CMV List:'];
  if(cRaw){
    const allParts=cRaw.replace(/\n/g,',').split(',').filter(p=>p.trim());
    let idx=0;if(allParts.length>0&&/^\d+$/.test(allParts[0].trim()))idx=1;
    while(idx+1<allParts.length){
      data.cmvs.push({dotNumber:allParts[idx].trim(),vin:allParts[idx+1].trim(),eventCount:allParts[idx+2]?.trim()||''});
      idx+=3;
    }
  }
  // Events
  const eRaw=segments['ELD Event List:'];
  if(eRaw){
    const lines=eRaw.split('\n').filter(l=>l.trim());
    for(const line of lines){
      const p=line.split(',');if(p.length<16)continue;
      data.events.push({
        seqId:p[0].trim(),recordStatus:parseInt(p[1]),recordOrigin:parseInt(p[2]),
        eventType:parseInt(p[3]),eventCode:parseInt(p[4]),
        date:p[5],time:p[6],accumMiles:p[7],accumHours:p[8],
        lat:p[9],lon:p[10],distSinceValid:p[11],
        cmvOrder:p[12]||'',userOrder:p[13]||'',
        malfIndicator:p[14]||'',dataDiagIndicator:p[15]||'',
        eventDataCheck:p[16]||'',lineDataCheck:p[17]||''
      });
    }
  }
  // Annotations
  const aRaw=segments['ELD Event Annotations or Comments:'];
  if(aRaw){
    const lines=aRaw.split('\n').filter(l=>l.trim());
    for(const line of lines){const p=line.split(',');if(p.length<5)continue;data.annotations[p[0].trim()]={userId:p[1],comment:p[2],date:p[3],time:p[4]};}
  }
  // Certifications
  const certRaw=segments["Driver's Certification/Recertification Actions:"];
  if(certRaw){
    const lines=certRaw.split('\n').filter(l=>l.trim());
    for(const line of lines){const p=line.split(',');if(p.length<6)continue;data.certifications.push({seqId:p[0].trim(),actionType:parseInt(p[1]),date:p[2],time:p[3],certifiedDate:p[4],actionCode:p[5],lineDataCheck:p[6]||''});}
  }
  // Malfunctions
  const mRaw=segments['Malfunctions and Data Diagnostic Events:'];
  if(mRaw){
    const lines=mRaw.split('\n').filter(l=>l.trim());
    for(const line of lines){const p=line.split(',');if(p.length<8)continue;data.malfunctions.push({seqId:p[0].trim(),eventType:parseInt(p[1]),eventCode:parseInt(p[2]),date:p[3],time:p[4],accumMiles:p[5],accumHours:p[6],recordOrigin:parseInt(p[7]),lineDataCheck:p[8]||''});}
  }
  // Logins
  const lRaw=segments['ELD Login/Logout Report:'];
  if(lRaw){
    const lines=lRaw.split('\n').filter(l=>l.trim());
    for(const line of lines){const p=line.split(',');if(p.length<7)continue;data.logins.push({seqId:p[0].trim(),eventCode:parseInt(p[1]),userId:p[2],date:p[3],time:p[4],accumMiles:p[5],accumHours:p[6],lineDataCheck:p[7]||''});}
  }
  // Engines
  const engRaw=segments['CMV Engine Power-Up and Shut Down Activity:'];
  if(engRaw){
    const lines=engRaw.split('\n').filter(l=>l.trim());
    for(const line of lines){const p=line.split(',');if(p.length<12)continue;data.engines.push({seqId:p[0].trim(),eventCode:parseInt(p[1]),date:p[2],time:p[3],accumMiles:p[4],accumHours:p[5],lat:p[6],lon:p[7],dotNumber:p[8],vin:p[9],truckNumber:p[10],shippingId:p[11],lineDataCheck:p[12]||''});}
  }
  const uiRaw=segments['Unidentified Driver Profile Records:'];
  if(uiRaw&&uiRaw.length>0) data.unidentified=uiRaw;
  const efRaw=segments['End of File:'];
  if(efRaw) data.checksum=efRaw.trim();
  return data;
}

// ========== RENDERERS ==========
function renderHeader(h){
  const initials=(h.firstName[0]||'')+(h.lastName[0]||'');
  document.getElementById('header-card').innerHTML=`
    <div class="header-top">
      <div class="header-driver">
        <div class="driver-avatar">${initials}</div>
        <div>
          <div class="driver-name">${h.firstName} ${h.lastName}</div>
          <div class="driver-carrier">${h.carrierName}</div>
        </div>
      </div>
      <div class="header-eld-badge">${h.eldFirmware} / ${h.eldProvider}</div>
    </div>
    <div class="header-grid">
      <div class="header-field"><label>USDOT</label><span>${h.dotNumber}</span></div>
      <div class="header-field"><label>VIN</label><span>${h.vin}</span></div>
      <div class="header-field"><label>Truck #</label><span>${h.truckNumber}</span></div>
      <div class="header-field"><label>Trailer #</label><span>${h.trailerNumber||'N/A'}</span></div>
      <div class="header-field"><label>DL State</label><span>${h.dlState}</span></div>
      <div class="header-field"><label>DL Number</label><span>${h.dlNumber}</span></div>
      <div class="header-field"><label>Multi-Day</label><span>${h.multiDay}-day</span></div>
      <div class="header-field"><label>TZ Offset</label><span>UTC-${h.timeZoneOffset}</span></div>
      <div class="header-field"><label>ELD ID</label><span>${h.eldId}</span></div>
      <div class="header-field"><label>Shipping Doc</label><span>${h.shippingId||'N/A'}</span></div>
      <div class="header-field"><label>Co-Driver</label><span>${h.codriverFlag==='0'?'None':h.codriverFirst+' '+h.codriverLast}</span></div>
      <div class="header-field"><label>File Checksum</label><span>${h.eldRegistration}</span></div>
    </div>`;
}

function renderSummary(data){
  const ae=data.events.filter(e=>e.recordStatus===1);
  const d=ae.filter(e=>e.eventType===1&&e.eventCode===3).length;
  const on=ae.filter(e=>e.eventType===1&&e.eventCode===4).length;
  const off=ae.filter(e=>e.eventType===1&&e.eventCode===1).length;
  const sl=ae.filter(e=>e.eventType===1&&e.eventCode===2).length;
  const cards=[
    {n:data.events.length,l:'Events',c:'var(--text)',bc:'var(--accent)'},
    {n:d,l:'Driving',c:'var(--driving)',bc:'var(--driving)'},
    {n:on,l:'On Duty',c:'var(--on-duty)',bc:'var(--on-duty)'},
    {n:off,l:'Off Duty',c:'var(--off-duty)',bc:'var(--off-duty)'},
    {n:sl,l:'Sleeper',c:'var(--sleeper)',bc:'var(--sleeper)'},
    {n:data.certifications.length,l:'Certs',c:'var(--cert)',bc:'var(--cert)'},
    {n:data.malfunctions.length,l:'Malf/Diag',c:'var(--malf)',bc:'var(--malf)'},
  ];
  document.getElementById('summary-row').innerHTML=cards.map(c=>
    `<div class="summary-card"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${c.bc};opacity:.6"></div><div class="num" style="color:${c.c}">${c.n}</div><div class="lbl">${c.l}</div></div>`
  ).join('');
}

function renderCertifications(certs){
  if(!certs.length)return'<div class="empty">No certification records</div>';
  return`<div class="table-wrap"><table>
    <thead><tr><th>Seq</th><th>Action</th><th>Action Date</th><th>Action Time</th><th>Day Certified</th><th>Code</th></tr></thead>
    <tbody>${certs.map(c=>{
      const css=c.actionType===1?'status-certify':'status-recertify';
      return`<tr><td class="coord">${c.seqId}</td><td><span class="status-badge ${css}">${CERT_ACTIONS[c.actionType]||c.actionType}</span></td><td>${fmtDate(c.date)}</td><td>${fmtTime(c.time)}</td><td><span class="cert-day">${fmtDate(c.certifiedDate)}</span></td><td class="coord">${c.actionCode}</td></tr>`;
    }).join('')}</tbody></table></div>`;
}

function renderEvents(events,annotations){
  if(!events.length)return'<div class="empty">No events</div>';
  return`<div class="table-wrap"><table>
    <thead><tr><th>Seq</th><th>Type</th><th>Status</th><th>Record</th><th>Origin</th><th>Date</th><th>Time</th><th>Miles</th><th>Hours</th><th>Location</th><th>Annotation</th></tr></thead>
    <tbody>${events.map(e=>{
      const tl=EVENT_TYPES[e.eventType]||e.eventType;
      let cl=e.eventCode,cc='';
      if(e.eventType===1){cl=DUTY_CODES[e.eventCode]||e.eventCode;cc='status-'+(DUTY_CSS[e.eventCode]||'');}
      const sl=RECORD_STATUS[e.recordStatus]||e.recordStatus;
      const sc=e.recordStatus===1?'status-active':'status-inactive';
      const ol=RECORD_ORIGIN[e.recordOrigin]||e.recordOrigin;
      const oc=ORIGIN_CSS[e.recordOrigin]||'';
      const ann=annotations[e.seqId];
      return`<tr>
        <td class="coord">${e.seqId}</td><td>${tl}</td>
        <td>${cc?`<span class="status-badge ${cc}">${cl}</span>`:cl}</td>
        <td><span class="status-badge ${sc}">${sl}</span></td>
        <td><span class="${oc}">${ol}</span></td>
        <td>${fmtDate(e.date)}</td><td>${fmtTime(e.time)}</td>
        <td class="coord">${e.accumMiles}</td><td class="coord">${e.accumHours}</td>
        <td class="coord">${fmtCoord(e.lat)}, ${fmtCoord(e.lon)}</td>
        <td>${ann?`<span class="annotation-text">${ann.comment}</span>`:''}</td></tr>`;
    }).join('')}</tbody></table></div>`;
}

function renderAnnotations(annotations){
  const keys=Object.keys(annotations);
  if(!keys.length)return'<div class="empty">No annotations</div>';
  return`<div class="table-wrap"><table>
    <thead><tr><th>Event Seq</th><th>User</th><th>Comment</th><th>Date</th><th>Time</th></tr></thead>
    <tbody>${keys.map(k=>{const a=annotations[k];return`<tr><td class="coord">${k}</td><td class="coord">${a.userId}</td><td>${a.comment}</td><td>${fmtDate(a.date)}</td><td>${fmtTime(a.time)}</td></tr>`;}).join('')}</tbody></table></div>`;
}

function renderMalfunctions(malfs){
  if(!malfs.length)return'<div class="empty">No malfunction/diagnostic events</div>';
  return`<div class="table-wrap"><table>
    <thead><tr><th>Seq</th><th>Type</th><th>Code</th><th>Date</th><th>Time</th><th>Miles</th><th>Hours</th><th>Origin</th></tr></thead>
    <tbody>${malfs.map(m=>{
      const tl=MALF_EVENT_TYPES[m.eventType]||m.eventType;
      const tc=m.eventType===4?'malf-malfunction':'malf-diagnostic';
      let cl=m.eventCode;
      if(m.eventType===3)cl=MALF_CODES_DIAG[m.eventCode]||m.eventCode;
      if(m.eventType===4)cl=MALF_CODES_MALF[m.eventCode]||m.eventCode;
      return`<tr><td class="coord">${m.seqId}</td><td><span class="${tc}">${tl}</span></td><td>${cl}</td><td>${fmtDate(m.date)}</td><td>${fmtTime(m.time)}</td><td class="coord">${m.accumMiles}</td><td class="coord">${m.accumHours}</td><td>${RECORD_ORIGIN[m.recordOrigin]||m.recordOrigin}</td></tr>`;
    }).join('')}</tbody></table></div>`;
}

function renderLogins(logins){
  if(!logins.length)return'<div class="empty">No login/logout events</div>';
  return`<div class="table-wrap"><table>
    <thead><tr><th>Seq</th><th>Action</th><th>User</th><th>Date</th><th>Time</th><th>Miles</th><th>Hours</th></tr></thead>
    <tbody>${logins.map(l=>{
      const css=l.eventCode===1?'status-active':'status-inactive';
      return`<tr><td class="coord">${l.seqId}</td><td><span class="status-badge ${css}">${LOGIN_TYPES[l.eventCode]||l.eventCode}</span></td><td class="coord">${l.userId}</td><td>${fmtDate(l.date)}</td><td>${fmtTime(l.time)}</td><td class="coord">${l.accumMiles}</td><td class="coord">${l.accumHours}</td></tr>`;
    }).join('')}</tbody></table></div>`;
}

function renderEngines(engines){
  if(!engines.length)return'<div class="empty">No engine activity</div>';
  return`<div class="table-wrap"><table>
    <thead><tr><th>Seq</th><th>Action</th><th>Date</th><th>Time</th><th>Miles</th><th>Hours</th><th>Location</th><th>VIN</th><th>Truck</th></tr></thead>
    <tbody>${engines.map(e=>{
      const css=e.eventCode===3?'status-active':'status-inactive';
      return`<tr><td class="coord">${e.seqId}</td><td><span class="status-badge ${css}">${ENGINE_TYPES[e.eventCode]||('Code '+e.eventCode)}</span></td><td>${fmtDate(e.date)}</td><td>${fmtTime(e.time)}</td><td class="coord">${e.accumMiles}</td><td class="coord">${e.accumHours}</td><td class="coord">${fmtCoord(e.lat)}, ${fmtCoord(e.lon)}</td><td class="coord">${e.vin}</td><td class="coord">${e.truckNumber}</td></tr>`;
    }).join('')}</tbody></table></div>`;
}

function renderUsers(users){
  if(!users.length)return'<div class="empty">No users</div>';
  return`<div class="table-wrap"><table>
    <thead><tr><th>ID</th><th>Role</th><th>Name</th></tr></thead>
    <tbody>${users.map(u=>`<tr><td class="coord">${u.userId}</td><td>${u.role}</td><td>${u.lastName}, ${u.firstName}</td></tr>`).join('')}</tbody></table></div>`;
}

function renderTimeline(events){
  const active=events.filter(e=>e.recordStatus===1&&e.eventType===1).sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:a.time<b.time?-1:1);
  if(!active.length)return'<div class="empty">No timeline data</div>';
  const days={};
  active.forEach(e=>{if(!days[e.date])days[e.date]=[];days[e.date].push(e);});
  const sortedDays=Object.keys(days).sort();

  // Legend
  const legendItems=[
    {label:'Off Duty',color:'var(--off-duty)',desc:'Not working, personal time'},
    {label:'Sleeper Berth',color:'var(--sleeper)',desc:'Rest period in sleeper'},
    {label:'Driving',color:'var(--driving)',desc:'Operating the CMV'},
    {label:'On Duty',color:'var(--on-duty)',desc:'Working but not driving'},
  ];
  let legendHtml=legendItems.map(l=>
    `<div class="legend-item" title="${l.desc}"><div class="legend-swatch" style="background:${l.color}"></div>${l.label}</div>`
  ).join('');

  // Hour axis
  const hours=[0,3,6,9,12,15,18,21,24];
  let axisHtml=hours.map(h=>{
    const pct=(h/24*100).toFixed(2);
    const label=String(h).padStart(2,'0')+':00';
    return`<span class="timeline-axis-tick" style="left:${pct}%">${label}</span><span class="timeline-axis-line" style="left:${pct}%"></span>`;
  }).join('');

  // Day rows
  let rowsHtml='';
  for(const day of sortedDays){
    const evts=days[day];
    const gridlines=[6,12,18].map(h=>`<div class="timeline-gridline" style="left:${(h/24*100).toFixed(2)}%"></div>`).join('');
    let segs='';
    for(let i=0;i<evts.length;i++){
      const e=evts[i];
      const startMin=timeToMinutes(e.time);
      const endMin=(i+1<evts.length)?timeToMinutes(evts[i+1].time):1440;
      const dur=endMin-startMin;
      const leftPct=(startMin/1440*100).toFixed(2);
      const widthPct=(dur/1440*100).toFixed(2);
      const color=DUTY_COLORS[e.eventCode]||'var(--text3)';
      const hex=DUTY_HEX[e.eventCode]||'#5c6478';
      const label=DUTY_CODES[e.eventCode]||'Unknown';
      const short=DUTY_SHORT[e.eventCode]||'?';
      segs+=`<div class="timeline-segment" style="left:${leftPct}%;width:${widthPct}%;background:${color}">
        <div class="timeline-tooltip">
          <div class="tt-status"><span class="tt-dot" style="background:${hex}"></span>${label}</div>
          <div class="tt-detail">
            ${fmtTimeShort(e.time)} - ${i+1<evts.length?fmtTimeShort(evts[i+1].time):'24:00'}<br>
            Duration: ${durationStr(dur)}<br>
            ${fmtCoord(e.lat)!=='-'?'Location: '+fmtCoord(e.lat)+', '+fmtCoord(e.lon):''}
          </div>
        </div>
      </div>`;
    }
    rowsHtml+=`<div class="timeline-day">
      <div class="timeline-label">${fmtDateShort(day)}</div>
      <div class="timeline-bar">${gridlines}${segs}</div>
    </div>`;
  }

  return`<div class="timeline-container">
    <div class="timeline-header">
      <div class="timeline-title">Duty Status Timeline</div>
      <div class="timeline-legend">${legendHtml}</div>
    </div>
    <div class="timeline-axis" style="margin-left:100px;position:relative;height:20px">${axisHtml}</div>
    ${rowsHtml}
  </div>`;
}

// ========== TAB SYSTEM ==========
function buildTabs(data){
  const tabDefs=[
    {id:'timeline',label:'Timeline',color:'var(--accent)',count:''},
    {id:'cert',label:'Certifications',color:'var(--cert)',count:data.certifications.length},
    {id:'events',label:'Events',color:'var(--text)',count:data.events.length},
    {id:'annotations',label:'Annotations',color:'var(--accent2)',count:Object.keys(data.annotations).length},
    {id:'malfunctions',label:'Malf / Diag',color:'var(--malf)',count:data.malfunctions.length},
    {id:'logins',label:'Login / Logout',color:'var(--login)',count:data.logins.length},
    {id:'engines',label:'Engine',color:'var(--engine)',count:data.engines.length},
    {id:'users',label:'Users',color:'var(--text3)',count:data.users.length},
  ];
  document.getElementById('tabs').innerHTML=tabDefs.map((t,i)=>
    `<div class="tab ${i===0?'active':''}" data-tab="${t.id}" onclick="switchTab('${t.id}')">
      <span class="dot" style="background:${t.color}"></span>${t.label}${t.count!==''?`<span class="badge">${t.count}</span>`:''}
    </div>`
  ).join('');
  document.getElementById('tab-panels').innerHTML=`
    <div class="tab-panel active" id="panel-timeline">${renderTimeline(data.events)}</div>
    <div class="tab-panel" id="panel-cert">${renderCertifications(data.certifications)}</div>
    <div class="tab-panel" id="panel-events">${renderEvents(data.events,data.annotations)}</div>
    <div class="tab-panel" id="panel-annotations">${renderAnnotations(data.annotations)}</div>
    <div class="tab-panel" id="panel-malfunctions">${renderMalfunctions(data.malfunctions)}</div>
    <div class="tab-panel" id="panel-logins">${renderLogins(data.logins)}</div>
    <div class="tab-panel" id="panel-engines">${renderEngines(data.engines)}</div>
    <div class="tab-panel" id="panel-users">${renderUsers(data.users)}</div>`;
}
function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+id));
}

// ========== FILE HANDLING ==========
function handleFile(file){
  const reader=new FileReader();
  reader.onload=function(ev){
    const data=parseEROD(ev.target.result);
    document.getElementById('drop-zone').style.display='none';
    document.getElementById('content').style.display='block';
    document.getElementById('file-name-display').textContent=file.name;
    renderHeader(data.header);renderSummary(data);buildTabs(data);
  };
  reader.readAsText(file);
}
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover')});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0]);});
document.getElementById('file-input').addEventListener('change',e=>{if(e.target.files.length)handleFile(e.target.files[0]);});
</script>
